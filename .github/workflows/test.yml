name: Test Build Next.js in Ubuntu

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  BuildNextJS:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/setup

      - name: Build
        run: pnpm build

  JestTest:
    runs-on: ubuntu-latest
    needs: BuildNextJS
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Environment
        uses: ./.github/setup

      - name: Run Test
        run: pnpm test